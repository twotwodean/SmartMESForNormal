name: CI

"on":
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartmes
          POSTGRES_PASSWORD: smartmes
          POSTGRES_DB: smartmes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartmes -d smartmes"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql://smartmes:smartmes@localhost:5432/smartmes?schema=public"
      E2E_DATABASE_URL: "postgresql://smartmes:smartmes@localhost:5432/smartmes?schema=e2e"
      SESSION_SECRET: "ci-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate (public schema)
        run: npx prisma migrate deploy

      - name: Seed public schema
        run: npm run db:seed

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (playwright, own e2e schema)
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
