# 로컬/컨테이너 전체 스택. 운영은 관리형 PG(RDS 등) 권장.
# 사용: docker compose up -d --build  →  app: http://localhost:3001 (헬스: /api/health)
services:
  postgres:
    image: postgres:16-alpine
    container_name: smartmes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartmes
      POSTGRES_PASSWORD: smartmes
      POSTGRES_DB: smartmes
    ports:
      - "5432:5432"
    volumes:
      - smartmes-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartmes -d smartmes"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: smartmes-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://smartmes:smartmes@postgres:5432/smartmes?schema=public
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-prod}
      NODE_ENV: production
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  smartmes-pgdata:
